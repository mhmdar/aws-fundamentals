# AWS Club Lab B/C — Amazon Linux 2023
#
# AL2023 has no /etc/nginx/conf.d/default.conf. The default server block is in
# /etc/nginx/nginx.conf and includes snippets from /etc/nginx/default.d/*.conf
#
# sub_filter does NOT run on gzipped responses — gzip must be off in this block.
#
# Create this file on the instance:
#
#   sudo tee /etc/nginx/default.d/aws-club-lab.conf <<'EOF'
location / {
    gzip off;
    sub_filter_types text/html;
    sub_filter '__PRIVATE_IP__' '$server_addr';
    sub_filter '__HOSTNAME__' '$hostname';
    sub_filter_once off;
}
# EOF
#
# Then reload:
#   sudo nginx -t && sudo systemctl reload nginx
#
# Verify (should show ip-10-0-1-xx, not __PRIVATE_IP__):
#   curl -s http://localhost | grep -E 'ip-10|__PRIVATE'
